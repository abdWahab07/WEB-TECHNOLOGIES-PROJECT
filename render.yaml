services:
  - type: web
    name: dynamic-portfolio
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn portfolio_project.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DJANGO_SETTINGS_MODULE
        value: portfolio_project.settings
      - key: RENDER
        value: "true"
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
    disk:
      name: portfolio-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
