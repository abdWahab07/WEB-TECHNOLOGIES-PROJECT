[build]
  command = "bash netlify-build.sh"
  publish = "netlify_publish"

[build.environment]
  PYTHON_VERSION = "3.12"
  DJANGO_SETTINGS_MODULE = "portfolio_project.settings"
  DEBUG = "false"

[[redirects]]
  from = "/portfolio/abdul-wahab/"
  to = "/"
  status = 302

[[redirects]]
  from = "/portfolio/laiba-zainab/"
  to = "/laiba/"
  status = 302

[[redirects]]
  from = "/laiba"
  to = "/laiba/"
  status = 302

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
